<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会員情報の登録｜岡崎市葵倫理法人会</title>
<meta name="theme-color" content="#1b2a4a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<main class="card">
  <header class="head">
    <div class="head-in">
      <p class="kai">OKAZAKI AOI RINRI</p>
      <h1>会員情報の登録</h1>
      <p id="greet" class="greet">お名前・役職・委員会をご登録ください。</p>
    </div>
  </header>

  <form id="regForm" class="form" novalidate>
    <input type="hidden" id="lineUserId">
    <input type="hidden" id="lineDisplayName">

    <label class="field">
      <span class="label">お名前 <em>必須</em></span>
      <input type="text" id="name" required autocomplete="name" placeholder="例）小久井 正秋">
    </label>

    <label class="field">
      <span class="label">会社名 <em class="opt">任意</em></span>
      <input type="text" id="company" autocomplete="organization" placeholder="例）有限会社小久井農場">
    </label>

    <label class="field">
      <span class="label">倫理法人会での役職 <em>必須</em></span>
      <select id="role" required></select>
    </label>
    <div class="field other" id="roleOther" hidden>
      <span class="label">役職（自由入力）</span>
      <input type="text" placeholder="役職をご入力ください">
    </div>

    <label class="field">
      <span class="label">所属委員会 <em>必須</em></span>
      <select id="committee" required></select>
    </label>
    <div class="field other" id="committeeOther" hidden>
      <span class="label">委員会（自由入力）</span>
      <input type="text" placeholder="委員会名をご入力ください">
    </div>

    <fieldset class="field roles">
      <legend class="label">委員会での役割（該当する場合）</legend>
      <label class="check"><input type="checkbox" name="committeeRole" value="リーダー"><span>リーダー</span></label>
      <label class="check"><input type="checkbox" name="committeeRole" value="サブリーダー"><span>サブリーダー</span></label>
    </fieldset>

    <button type="submit" id="submitBtn" class="btn">登録する</button>
    <p id="note" class="note"></p>
    <p class="privacy">ご入力内容は、出欠連絡・委員会や行事のご案内に使用します。</p>
  </form>

  <div id="done" class="done" hidden>
    <div class="done-mark">✓</div>
    <h2>ご登録ありがとうございました</h2>
    <p>内容に変更があれば、メニュー「会員登録」からいつでも更新できます。</p>
  </div>
</main>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="js/app.js"></script>
</body>
</html>
